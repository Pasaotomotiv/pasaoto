<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAŞA OTO | Bornova Oto Tamir & Periyodik Bakım Servisi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #D32F2F;
            --primary-dark: #B71C1C;
            --dark: #1E2229;
            --gray-dark: #2A2F3A;
            --gray-light: #F4F5F7;
            --gray-border: #E2E8F0;
            --text-main: #334155;
            --white: #FFFFFF;
            --font: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); scroll-behavior: smooth; }
        body { color: var(--text-main); background-color: var(--white); line-height: 1.6; }

        header { background-color: var(--dark); position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; border-bottom: 3px solid var(--primary); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); font-size: 24px; font-weight: 700; }
        .logo i { color: var(--primary); font-size: 26px; }
        .nav-links { display: flex; align-items: center; gap: 30px; list-style: none; }
        .nav-links a { color: var(--gray-border); text-decoration: none; font-weight: 500; font-size: 15px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .btn-call { background-color: var(--primary); color: var(--white) !important; padding: 10px 18px; border-radius: 6px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .hero { background: linear-gradient(rgba(30, 34, 41, 0.85), rgba(30, 34, 41, 0.85)), url('https://images.unsplash.com/photo-1530046339160-ce3e530c0721?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover; height: 80vh; display: flex; align-items: center; padding-top: 80px; color: var(--white); }
        .hero-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }
        .hero h1 { font-size: 48px; margin-bottom: 15px; }
        .btn-whatsapp { background-color: #25D366; color: var(--white); text-decoration: none; padding: 14px 28px; border-radius: 6px; display: inline-flex; align-items: center; gap: 10px; }

        section { padding: 80px 20px; }
        .section-title { text-align: center; font-size: 32px; color: var(--dark); margin-bottom: 40px; }
        
        .services-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; }
        .service-card { background: var(--white); border: 1px solid var(--gray-border); padding: 30px; text-align: center; border-radius: 8px; }

        .gallery-wrapper { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .gallery-item { border-radius: 8px; overflow: hidden; height: 250px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .maps-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; border-radius: 12px; overflow: hidden; border: 1px solid var(--gray-border); }
        .map-iframe { width: 100%; height: 450px; border: 0; }
        .map-info-card { background-color: var(--dark); color: var(--white); padding: 40px; }

        footer { background-color: #15181E; color: var(--white); padding: 60px 20px; }

        /* Mobil Düzen */
        @media (max-width: 768px) {
            .nav-links { display: none; /* Basitlik için gizli, menü butonu eklemek istersen JS gerektirir */ }
            .hero h1 { font-size: 28px; }
            .maps-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="#" class="logo">
                <i class="fa-solid fa-screwdriver-wrench"></i> PAŞA OTO
            </a>
            <ul class="nav-links">
                <li><a href="#hakkimizda">Hakkımızda</a></li>
                <li><a href="#hizmetler">Hizmetlerimiz</a></li>
                <li><a href="#galeri">Galeri</a></li>
                <li><a href="#iletisim">İletişim</a></li>
                <li><a href="tel:+905367909767" class="btn-call"><i class="fa-solid fa-phone"></i> 0536 790 97 67</a></li>
            </ul>
        </div>
    </header>

    <section class="hero">
        <div class="hero-container">
            <h1>Bornova'da Profesyonel Oto Bakım</h1>
            <p>Aracınız için güvenilir, şeffaf ve kaliteli servis hizmeti.</p>
            <br>
            <a href="https://api.whatsapp.com/send?phone=905367909767" class="btn-whatsapp" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> Randevu Al
            </a>
        </div>
    </section>

    <!-- Diğer bölümler buraya eklenebilir... -->
    
    <!-- İletişim Bölümü (Harita Güncellemesi) -->
    <section id="iletisim">
        <h2 class="section-title">Konumumuz</h2>
        <div class="maps-container">
            <!-- BURAYI GÜNCELLE: Google Maps'ten "Haritayı Yerleştir" kodunu alıp buraya yapıştır -->
            <iframe class="map-iframe" src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d12502.5!2d27.2404!3d38.4411!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sPaşa+Otomotiv!5e0!3m2!1str!2str!4v1700000000000" allowfullscreen="" loading="lazy"></iframe>
            
            <div class="map-info-card">
                <h3>PAŞA OTO</h3>
                <p>Bornova / İzmir</p>
                <a href="https://www.google.com/maps/search/Paşa+Otomotiv+Bornova" class="btn-call" style="display:inline-block; width:auto;">Yol Tarifi Al</a>
            </div>
        </div>
    </section>

</body>
</html>
